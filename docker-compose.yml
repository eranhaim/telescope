services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=7291
    expose:
      - "7291"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

  bot:
    build: ./bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
